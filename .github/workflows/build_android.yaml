name: Android APK CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: Android/src

env:
  JAVA_VERSION: '21'

jobs:
  build-apks:
    name: Build Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show build environment
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        run: ./gradlew --stacktrace --no-daemon assembleDebug

      - name: Build release APK
        run: ./gradlew --stacktrace --no-daemon assembleRelease

      - name: List generated APKs
        run: find app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | sort

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inferEdge-debug-apk-${{ github.sha }}
          path: Android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: inferEdge-release-apk-${{ github.sha }}
          path: Android/src/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inferEdge-build-reports-${{ github.sha }}
          path: |
            Android/src/app/build/reports
            Android/src/app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish job summary
        if: always()
        run: |
          {
            echo '## Android APK build'
            echo ''
            echo '- Branch: `${{ github.ref_name }}`'
            echo '- Commit: `${{ github.sha }}`'
            echo '- Debug artifact: `inferEdge-debug-apk-${{ github.sha }}`'
            echo '- Release artifact: `inferEdge-release-apk-${{ github.sha }}`'
            echo ''
            echo '### Generated outputs'
            find app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | sort | sed 's/^/- `/' | sed 's/$/`/' || true
          } >> "$GITHUB_STEP_SUMMARY"
